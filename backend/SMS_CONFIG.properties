# =====================================================
# SMS Integration Configuration for application.properties
# =====================================================

# SMS Provider Configuration
# Options: "twilio", "mock" (default for development)
app.sms.provider=mock

# Twilio Configuration (if using Twilio)
# Get these from https://www.twilio.com/console
app.sms.twilio.account-sid=${TWILIO_ACCOUNT_SID}
app.sms.twilio.auth-token=${TWILIO_AUTH_TOKEN}
app.sms.twilio.from-number=+221761234567

# SMS Service Configuration
app.sms.max-retries=3
app.sms.retry-interval=300000  # 5 minutes in milliseconds

# =====================================================
# Async Processing Configuration
# =====================================================

# Thread pool for async SMS sending
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=sms-async-

# =====================================================
# Scheduled Tasks Configuration
# =====================================================

# Thread pool for scheduled retry tasks
spring.task.scheduling.pool.size=2
spring.task.scheduling.thread-name-prefix=sms-scheduler-

# =====================================================
# Logging Configuration for SMS Module
# =====================================================

logging.level.com.evaccin.service.SmsNotificationService=INFO
logging.level.com.evaccin.service.sms.provider=INFO
logging.level.com.evaccin.repository.NotificationRepository=DEBUG

# =====================================================
# Additional Database Connection Configuration
# =====================================================

# Connection pool settings (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# =====================================================
# Transaction Configuration
# =====================================================

spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# =====================================================
# Example Configurations for Different Environments
# =====================================================

# === DEVELOPMENT (uses Mock SMS) ===
# app.sms.provider=mock
# No Twilio configuration needed

# === STAGING (uses Twilio with test credentials) ===
# app.sms.provider=twilio
# TWILIO_ACCOUNT_SID from environment variable
# TWILIO_AUTH_TOKEN from environment variable
# app.sms.twilio.from-number=+1201951XXXX (test number)

# === PRODUCTION (uses Twilio with production credentials) ===
# app.sms.provider=twilio
# TWILIO_ACCOUNT_SID from AWS Secrets Manager
# TWILIO_AUTH_TOKEN from AWS Secrets Manager
# app.sms.twilio.from-number=+221761234567 (production Senegal number)

# =====================================================
# Environment Variable Setup (For Docker/CI-CD)
# =====================================================
# export TWILIO_ACCOUNT_SID="ACxxxxxxxxx"
# export TWILIO_AUTH_TOKEN="your_auth_token_here"
# export SPRING_DATASOURCE_URL="jdbc:mysql://mysql-server:3306/evaccin_db"
# export SPRING_DATASOURCE_USERNAME="root"
# export SPRING_DATASOURCE_PASSWORD="your_password"
