# Base de données MySQL / XAMPP
spring.datasource.url=jdbc:mysql://localhost:3306/evaccin_db
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Port serveur
server.port=8080

# Nom application
spring.application.name=e-vaccin

# ========================
# JWT SECURITY CONFIGURATION
# ========================
app.jwt.secret=e-vaccin-super-secret-key-minimum-32-characters-length-requirement
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# ========================
# TWILIO SMS CONFIGURATION
# ========================
twilio.account-sid=${TWILIO_ACCOUNT_SID:AC00000000000000000000000000000000}
twilio.auth-token=${TWILIO_AUTH_TOKEN:your-auth-token}
twilio.phone-number=${TWILIO_PHONE_NUMBER:+1234567890}

# Use Mock SMS provider by default (set to false to use Twilio)
sms.provider.mock=true

# ========================
# LOGGING
# ========================
logging.level.root=INFO
logging.level.com.evaccin=DEBUG
logging.level.org.springframework.security=DEBUG